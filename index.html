<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VERNIAN - バーニアン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    -webkit-user-select: none; user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #app {
    position: relative;
    display: flex;
    flex-direction: column;
    width: 90vw;
    height: 90vh;
    background: #0b0e17;
    box-shadow: 0 0 24px rgba(90,190,255,0.15);
    border-radius: 10px;
    overflow: hidden;
  }
  #playArea {
    position: relative;
    width: 100%;
    height: 52%;
    background: linear-gradient(#0d1120, #131a2e);
    overflow: hidden;
  }
  #gameCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #hud {
    position: absolute;
    top: 8px; left: 10px;
    color: #8fd6ff;
    font-size: 12px;
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(90,190,255,0.6);
    pointer-events: none;
    line-height: 1.5;
  }
  #hud .title {
    font-size: 14px;
    font-weight: bold;
    color: #ffd36b;
    text-shadow: 0 0 6px rgba(255,180,60,0.7);
  }
  #clearOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,10,25,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #ffe9a8;
    text-shadow: 0 0 10px rgba(255,200,80,0.8);
    pointer-events: none;
  }
  #clearOverlay .big {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
  }
  #clearOverlay .small {
    font-size: 12px;
    margin-top: 6px;
    color: #cfe8ff;
  }
  #controlArea {
    position: relative;
    width: 100%;
    height: 48%;
    background: #12172a;
    border-top: 2px solid #263356;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 8% 6% 0 6%;
    box-sizing: border-box;
  }
  .btn {
    width: 24vw;
    max-width: 120px;
    height: 24vw;
    max-height: 120px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: #dff2ff;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 0 rgba(0,0,0,0.4), inset 0 2px 6px rgba(255,255,255,0.15);
    transition: transform 0.05s, box-shadow 0.05s;
  }
  .btn:active, .btn.pressed {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.4), inset 0 2px 6px rgba(0,0,0,0.3);
  }
  #btnLeft, #btnRight {
    background: linear-gradient(#3a4a78, #26325a);
    border: 2px solid #4d6099;
  }
  #dpad {
    display: flex;
    gap: 12px;
  }
  #btnVernier {
    background: linear-gradient(#ff8a4c, #d9541c);
    border: 2px solid #ff9c5c;
    flex-direction: column;
  }
  #btnVernier .label {
    font-size: 10px;
    margin-top: 2px;
    opacity: 0.9;
  }
  .arrow {
    font-size: 28px;
    line-height: 1;
  }

  /* ---- 8bit風タイトル/設定/ゲームオーバー画面 ---- */
  .screen {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: #0a0d1a;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 4px 4px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #cfe8ff;
    font-family: 'Press Start 2P', monospace;
    text-align: center;
    padding: 6% 8%;
    box-sizing: border-box;
  }
  .screen.visible { display: flex; }
  .pixel-title {
    font-size: clamp(26px, 9vw, 44px);
    color: #ffe066;
    text-shadow: 3px 3px 0 #d9503f, 6px 6px 0 rgba(0,0,0,0.5);
    letter-spacing: 3px;
    margin-bottom: 8%;
    line-height: 1.3;
  }
  .pixel-heading {
    font-size: clamp(14px, 4.5vw, 18px);
    color: #8fd6ff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
    margin-bottom: 6%;
    letter-spacing: 2px;
  }
  .retro-btn {
    font-family: 'Press Start 2P', monospace;
    background: #1a2140;
    border: 3px solid #8fd6ff;
    color: #dff2ff;
    padding: 12px 20px;
    font-size: clamp(11px, 3.2vw, 14px);
    margin: 8px;
    box-shadow: 4px 4px 0 #04182e;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 2px;
  }
  .retro-btn:active {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0 #04182e;
  }
  .retro-btn.primary {
    border-color: #ffe066;
    color: #ffe066;
  }
  .settings-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 3% 0;
    width: 100%;
  }
  .settings-label {
    font-size: clamp(10px, 3vw, 13px);
    color: #ffe066;
    margin-bottom: 3%;
    letter-spacing: 2px;
  }
  .option-row {
    display: flex;
    gap: 10px;
  }
  .option-btn {
    font-family: 'Press Start 2P', monospace;
    background: #14192e;
    border: 2px solid #4d6099;
    color: #9fb6d9;
    padding: 8px 14px;
    font-size: clamp(11px, 3vw, 14px);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .option-btn.selected {
    background: #ff8a4c;
    border-color: #ffcaa0;
    color: #1a0d05;
  }
  .speed-slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 80%;
    max-width: 320px;
  }
  #speedSlider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 8px;
    background: #263356;
    border: 2px solid #4d6099;
    outline: none;
  }
  #speedSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #ffe066;
    border: 2px solid #8f6b00;
    cursor: pointer;
  }
  #speedSlider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: #ffe066;
    border: 2px solid #8f6b00;
    cursor: pointer;
  }
  #speedValue {
    font-size: clamp(11px, 3vw, 14px);
    color: #8fd6ff;
    min-width: 3.5em;
  }
  .version-text {
    position: absolute;
    bottom: 4%;
    font-size: 9px;
    color: #4d6099;
    letter-spacing: 1px;
  }
  #gameOverScreen .pixel-title {
    color: #ff5a5a;
    text-shadow: 3px 3px 0 #7a1414, 6px 6px 0 rgba(0,0,0,0.5);
  }
  #gameOverScreen .pixel-heading {
    color: #ffcaa0;
  }
</style>
</head>
<body>
<div id="app">
  <div id="titleScreen" class="screen visible">
    <div class="pixel-title">VERNIAN</div>
    <button class="retro-btn primary" id="btnGameStart">GAME START</button>
    <button class="retro-btn" id="btnOpenSettings">SETTING</button>
    <div class="version-text">v7</div>
  </div>

  <div id="settingsScreen" class="screen">
    <div class="pixel-heading">SETTING</div>

    <div class="settings-row">
      <div class="settings-label">LIFE</div>
      <div class="option-row" id="lifeOptions">
        <div class="option-btn" data-value="3">3</div>
        <div class="option-btn" data-value="5">5</div>
        <div class="option-btn selected" data-value="infinite">&#8734;</div>
      </div>
    </div>

    <div class="settings-row">
      <div class="settings-label">SPEED</div>
      <div class="speed-slider-row">
        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        <div id="speedValue">1.0x</div>
      </div>
    </div>

    <button class="retro-btn" id="btnBackToTitle">TITLE</button>
    <div class="version-text">v7</div>
  </div>

  <div id="gameOverScreen" class="screen">
    <div class="pixel-title">GAME OVER</div>
    <div class="pixel-heading">STAGE <span id="gameOverStage">1</span></div>
    <button class="retro-btn primary" id="btnGameOverTitle">TITLE</button>
  </div>

  <div id="playArea">
    <canvas id="gameCanvas"></canvas>
    <div id="hud"><span class="title">VERNIAN</span><br>STAGE <span id="stageNum">1</span>　ダイヤ <span id="gemCount">0</span>/<span id="gemTotal">3</span>　LIFE <span id="lifeDisplay">&#8734;</span></div>
    <div id="clearOverlay">
      <div class="big">STAGE CLEAR!</div>
      <div class="small">次のステージへ…</div>
    </div>
  </div>
  <div id="controlArea">
    <div id="dpad">
      <div class="btn" id="btnLeft"><span class="arrow">◀</span></div>
      <div class="btn" id="btnRight"><span class="arrow">▶</span></div>
    </div>
    <div class="btn" id="btnVernier">
      <div class="arrow">▲</div>
      <div class="label">VERNIER</div>
    </div>
  </div>
</div>

<script>
(function() {
  // ---- 拡大(ズーム)の抑止 ----
  // Safari系のピンチジェスチャーを抑止
  document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });
  // ダブルタップズームの抑止
  document.addEventListener('dblclick', function(e) { e.preventDefault(); }, { passive: false });
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTouchEnd <= 350) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });
  // 2本指以上でのタッチ操作(ピンチ)そのものを抑止
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const stageNumEl = document.getElementById('stageNum');
  const gemCountEl = document.getElementById('gemCount');
  const gemTotalEl = document.getElementById('gemTotal');
  const lifeDisplayEl = document.getElementById('lifeDisplay');
  const clearOverlay = document.getElementById('clearOverlay');

  const titleScreen = document.getElementById('titleScreen');
  const settingsScreen = document.getElementById('settingsScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const gameOverStageEl = document.getElementById('gameOverStage');
  const speedSlider = document.getElementById('speedSlider');
  const speedValueEl = document.getElementById('speedValue');
  const lifeOptions = document.getElementById('lifeOptions');

  // ---- アプリ全体の状態 ----
  let appState = 'title'; // 'title' | 'settings' | 'playing' | 'gameover'
  let lifeSetting = 'infinite'; // 3 | 5 | 'infinite'
  let speedSetting = 1.0;       // 0.5 ~ 2.0
  let livesRemaining = Infinity;

  function showScreen(name) {
    titleScreen.classList.toggle('visible', name === 'title');
    settingsScreen.classList.toggle('visible', name === 'settings');
    gameOverScreen.classList.toggle('visible', name === 'gameover');
  }

  function updateLifeHud() {
    lifeDisplayEl.textContent = (lifeSetting === 'infinite') ? '\u221E' : livesRemaining;
  }

  document.getElementById('btnOpenSettings').addEventListener('click', () => {
    appState = 'settings';
    showScreen('settings');
  });
  document.getElementById('btnBackToTitle').addEventListener('click', () => {
    appState = 'title';
    showScreen('title');
  });
  document.getElementById('btnGameOverTitle').addEventListener('click', () => {
    appState = 'title';
    showScreen('title');
  });
  document.getElementById('btnGameStart').addEventListener('click', () => {
    beginNewGame();
  });

  lifeOptions.querySelectorAll('.option-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      lifeOptions.querySelectorAll('.option-btn').forEach((b) => b.classList.remove('selected'));
      btn.classList.add('selected');
      const v = btn.dataset.value;
      lifeSetting = (v === 'infinite') ? 'infinite' : parseInt(v, 10);
    });
  });

  speedSlider.addEventListener('input', () => {
    speedSetting = Math.round(parseFloat(speedSlider.value) * 10) / 10;
    speedValueEl.textContent = speedSetting.toFixed(1) + 'x';
  });

  // ---- ワールド設定 ----
  const TILE = 30;
  const COLS = 12;
  const ROWS_PER_SCREEN = 10;
  const ROWS = ROWS_PER_SCREEN * 2;
  const WORLD_W = COLS * TILE;
  const VIEW_H = ROWS_PER_SCREEN * TILE;
  const WORLD_H = ROWS * TILE;

  canvas.width = WORLD_W;
  canvas.height = VIEW_H;

  // ---- ステージ状態 ----
  let stage = 1;
  let grid = [];
  let gems = [];
  let gemsTotal = 3;
  let gemsCollected = 0;
  let gameState = 'playing'; // 'playing' | 'clear'
  let stageClearTimer = 0;
  let enemies = [];
  let stageStartX = 0, stageStartY = 0;

  const BASE_ENEMY_SPEED = 1.5;
  const BASE_ENEMY_ROT_SPEED = 0.09;
  let ENEMY_SPEED = BASE_ENEMY_SPEED;
  let ENEMY_ROT_SPEED = BASE_ENEMY_ROT_SPEED;


  function generateMaze() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) {
        let brick = 0;
        if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
          brick = 1;
        }
        row.push(brick);
      }
      grid.push(row);
    }
    const spawnClearRows = 3;
    for (let r = 2; r < ROWS - 2; r++) {
      if (r < spawnClearRows) continue;
      for (let c = 1; c < COLS - 1; c++) {
        if (Math.random() < 0.16) {
          grid[r][c] = 1;
        }
      }
    }
    const platforms = Math.floor(ROWS / 2.2);
    for (let i = 0; i < platforms; i++) {
      const r = 3 + Math.floor(Math.random() * (ROWS - 6));
      const startC = 1 + Math.floor(Math.random() * (COLS - 4));
      const len = 2 + Math.floor(Math.random() * 3);
      for (let c = startC; c < Math.min(startC + len, COLS - 1); c++) {
        grid[r][c] = 1;
      }
    }
    grid[1][Math.floor(COLS / 2)] = 0;
    grid[2][Math.floor(COLS / 2)] = 0;
  }

  function isBrick(col, row) {
    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return true;
    return grid[row][col] === 1;
  }

  // スポーン地点から上下左右にたどれる空間(=到達可能なマス)を求める
  function computeReachable(startR, startC) {
    const visited = new Set();
    const key = (r, c) => r + ',' + c;
    const queue = [[startR, startC]];
    visited.add(key(startR, startC));
    while (queue.length) {
      const [r, c] = queue.shift();
      const neighbors = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]];
      for (const [nr, nc] of neighbors) {
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
        if (grid[nr][nc] === 1) continue;
        const k = key(nr, nc);
        if (!visited.has(k)) {
          visited.add(k);
          queue.push([nr, nc]);
        }
      }
    }
    return visited;
  }

  function placeGems(count, reachable, spawnRow, spawnCol) {
    const candidates = [];
    for (let r = 2; r < ROWS - 1; r++) {
      for (let c = 1; c < COLS - 1; c++) {
        if (
          grid[r][c] === 0 &&
          reachable.has(r + ',' + c) &&
          !(r === spawnRow && c === spawnCol) &&
          !(r === spawnRow + 1 && c === spawnCol)
        ) {
          candidates.push({ r, c });
        }
      }
    }
    // シャッフル
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    const result = [];
    const chosen = candidates.slice(0, Math.min(count, candidates.length));
    for (const cell of chosen) {
      result.push({
        x: cell.c * TILE,
        y: cell.r * TILE,
        collected: false
      });
    }
    return result;
  }

  function spawnEnemies(count, reachable, spawnRow, spawnCol, gemCells) {
    const candidates = [];
    for (let r = 2; r < ROWS - 1; r++) {
      for (let c = 1; c < COLS - 1; c++) {
        const key = r + ',' + c;
        if (
          grid[r][c] === 0 &&
          reachable.has(key) &&
          !(r === spawnRow && c === spawnCol) &&
          !(r === spawnRow + 1 && c === spawnCol) &&
          !gemCells.has(key)
        ) {
          candidates.push({ r, c });
        }
      }
    }
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    const result = [];
    const chosen = candidates.slice(0, Math.min(count, candidates.length));
    for (const cell of chosen) {
      result.push({
        x: cell.c * TILE + TILE / 2 - 10,
        y: cell.r * TILE + TILE / 2 - 7,
        w: 20, h: 14,
        dirX: Math.random() < 0.5 ? -1 : 1,
        dirY: Math.random() < 0.5 ? -1 : 1,
        rotation: Math.random() * Math.PI * 2
      });
    }
    return result;
  }

  function startStage(n) {
    stage = n;
    gemsTotal = 2 + stage; // ステージ1で3個、以降+1ずつ
    const spawnRow = 1, spawnCol = Math.floor(COLS / 2);

    // 到達可能なマスがダイヤ必要数を満たすまで迷路を生成し直す
    let reachable;
    let attempts = 0;
    do {
      generateMaze();
      reachable = computeReachable(spawnRow, spawnCol);
      attempts++;
    } while (reachable.size < gemsTotal + 2 && attempts < 40);

    gems = placeGems(gemsTotal, reachable, spawnRow, spawnCol);
    gemsCollected = 0;

    const gemCells = new Set(gems.map(g => Math.floor(g.y / TILE) + ',' + Math.floor(g.x / TILE)));
    const enemyCount = stage >= 2 ? stage - 1 : 0; // 2面から出現、以降1体ずつ増加
    enemies = spawnEnemies(enemyCount, reachable, spawnRow, spawnCol, gemCells);

    stageNumEl.textContent = stage;
    gemTotalEl.textContent = gemsTotal;
    gemCountEl.textContent = gemsCollected;

    player.x = (COLS / 2) * TILE - 10;
    player.y = TILE * 1.3;
    player.vx = 0;
    player.vy = 0;
    stageStartX = player.x;
    stageStartY = player.y;

    gameState = 'playing';
    clearOverlay.style.display = 'none';
  }


  // ---- プレイヤー(自機:バーニアン) ----
  const player = {
    x: 0, y: 0, w: 20, h: 24,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
    visualTilt: 0
  };

  const BASE_GRAVITY = 0.45;
  const BASE_MAX_FALL = 8;
  const BASE_MOVE_SPEED = 2.6;
  const BASE_THRUST_ACCEL = 0.75;
  const BASE_MAX_UP_SPEED = 4.5;
  let GRAVITY = BASE_GRAVITY;
  let MAX_FALL = BASE_MAX_FALL;
  let MOVE_SPEED = BASE_MOVE_SPEED;
  let THRUST_ACCEL = BASE_THRUST_ACCEL;
  let MAX_UP_SPEED = BASE_MAX_UP_SPEED;

  // SPEED設定(0.5〜2.0)をゲーム全体の速度に反映する
  function applySpeed() {
    const s = speedSetting;
    GRAVITY = BASE_GRAVITY * s;
    MAX_FALL = BASE_MAX_FALL * s;
    MOVE_SPEED = BASE_MOVE_SPEED * s;
    THRUST_ACCEL = BASE_THRUST_ACCEL * s;
    MAX_UP_SPEED = BASE_MAX_UP_SPEED * s;
    ENEMY_SPEED = BASE_ENEMY_SPEED * s;
    ENEMY_ROT_SPEED = BASE_ENEMY_ROT_SPEED * s;
  }

  function beginNewGame() {
    applySpeed();
    livesRemaining = (lifeSetting === 'infinite') ? Infinity : lifeSetting;
    updateLifeHud();
    appState = 'playing';
    showScreen('none');
    startStage(1);
  }

  // ---- 入力 ----
  const input = { left: false, right: false, thrust: false };

  function bindButton(id, onDown, onUp) {
    const el = document.getElementById(id);
    const down = (e) => { e.preventDefault(); onDown(); el.classList.add('pressed'); };
    const up = (e) => { e.preventDefault(); onUp(); el.classList.remove('pressed'); };
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointerleave', up);
    el.addEventListener('pointercancel', up);
  }
  bindButton('btnLeft', () => input.left = true, () => input.left = false);
  bindButton('btnRight', () => input.right = true, () => input.right = false);
  bindButton('btnVernier', () => input.thrust = true, () => input.thrust = false);

  window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft') input.left = true;
    if (e.code === 'ArrowRight') input.right = true;
    if (e.code === 'Space' || e.code === 'ArrowUp') input.thrust = true;
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft') input.left = false;
    if (e.code === 'ArrowRight') input.right = false;
    if (e.code === 'Space' || e.code === 'ArrowUp') input.thrust = false;
  });

  // ---- 衝突判定つき移動 ----
  function moveX(dx) {
    if (dx === 0) return;
    player.x += dx;
    const left = player.x;
    const right = player.x + player.w;
    const top = player.y;
    const bottom = player.y + player.h;
    const c1 = Math.floor(left / TILE);
    const c2 = Math.floor((right - 0.01) / TILE);
    const r1 = Math.floor(top / TILE);
    const r2 = Math.floor((bottom - 0.01) / TILE);
    for (let r = r1; r <= r2; r++) {
      for (let c = c1; c <= c2; c++) {
        if (isBrick(c, r)) {
          if (dx > 0) {
            player.x = c * TILE - player.w;
          } else {
            player.x = (c + 1) * TILE;
          }
          player.vx = 0;
        }
      }
    }
  }

  function moveY(dy) {
    if (dy === 0) return;
    player.y += dy;
    player.onGround = false;
    const top = player.y;
    const bottom = player.y + player.h;
    const left = player.x;
    const right = player.x + player.w;
    const c1 = Math.floor(left / TILE);
    const c2 = Math.floor((right - 0.01) / TILE);
    const r1 = Math.floor(top / TILE);
    const r2 = Math.floor((bottom - 0.01) / TILE);
    for (let r = r1; r <= r2; r++) {
      for (let c = c1; c <= c2; c++) {
        if (isBrick(c, r)) {
          if (dy > 0) {
            player.y = r * TILE - player.h;
            player.onGround = true;
          } else {
            player.y = (r + 1) * TILE;
          }
          player.vy = 0;
        }
      }
    }
  }

  // ---- カメラ ----
  let cameraY = 0;

  // ---- 敵(ラグビーボール)の移動 ----
  function rectHitsBrick(x, y, w, h) {
    const c1 = Math.floor(x / TILE);
    const c2 = Math.floor((x + w - 0.01) / TILE);
    const r1 = Math.floor(y / TILE);
    const r2 = Math.floor((y + h - 0.01) / TILE);
    for (let r = r1; r <= r2; r++) {
      for (let c = c1; c <= c2; c++) {
        if (isBrick(c, r)) return true;
      }
    }
    return false;
  }

  function moveEnemyAxis(enemy, dx, dy) {
    if (dx !== 0) {
      const nx = enemy.x + dx;
      if (rectHitsBrick(nx, enemy.y, enemy.w, enemy.h)) {
        enemy.dirX *= -1;
      } else {
        enemy.x = nx;
      }
    }
    if (dy !== 0) {
      const ny = enemy.y + dy;
      if (rectHitsBrick(enemy.x, ny, enemy.w, enemy.h)) {
        enemy.dirY *= -1;
      } else {
        enemy.y = ny;
      }
    }
  }

  function updateEnemies() {
    for (const enemy of enemies) {
      const centerCol = Math.floor((enemy.x + enemy.w / 2) / TILE);
      const centerRow = Math.floor((enemy.y + enemy.h / 2) / TILE);

      const leftBlocked = isBrick(centerCol - 1, centerRow);
      const rightBlocked = isBrick(centerCol + 1, centerRow);
      const upBlocked = isBrick(centerCol, centerRow - 1);
      const downBlocked = isBrick(centerCol, centerRow + 1);

      // 幅が一つしかない空間(左右または上下が塞がっている)では、その通路に沿って直進する
      const vertCorridor = leftBlocked && rightBlocked && !(upBlocked && downBlocked);
      const horizCorridor = upBlocked && downBlocked && !(leftBlocked && rightBlocked);

      let dx, dy;
      if (vertCorridor) {
        dx = 0;
        dy = enemy.dirY * ENEMY_SPEED;
      } else if (horizCorridor) {
        dx = enemy.dirX * ENEMY_SPEED;
        dy = 0;
      } else {
        dx = enemy.dirX * ENEMY_SPEED;
        dy = enemy.dirY * ENEMY_SPEED;
      }

      moveEnemyAxis(enemy, dx, dy);
      enemy.rotation += ENEMY_ROT_SPEED;
    }
  }

  function triggerGameOver() {
    appState = 'gameover';
    gameOverStageEl.textContent = stage;
    showScreen('gameover');
  }

  function checkEnemyCollision() {
    for (const enemy of enemies) {
      const ex1 = enemy.x + 2, ex2 = enemy.x + enemy.w - 2;
      const ey1 = enemy.y + 2, ey2 = enemy.y + enemy.h - 2;
      const px1 = player.x, px2 = player.x + player.w;
      const py1 = player.y, py2 = player.y + player.h;
      if (px1 < ex2 && px2 > ex1 && py1 < ey2 && py2 > ey1) {
        if (lifeSetting !== 'infinite') {
          livesRemaining--;
          updateLifeHud();
          if (livesRemaining <= 0) {
            triggerGameOver();
            return;
          }
        }
        // 敵に接触 -> ステージ開始地点に戻される(取得済みダイヤは維持)
        player.x = stageStartX;
        player.y = stageStartY;
        player.vx = 0;
        player.vy = 0;
        return;
      }
    }
  }

  function updateCamera() {
    const targetY = player.y + player.h / 2 - VIEW_H / 2;
    cameraY = Math.max(0, Math.min(WORLD_H - VIEW_H, targetY));
  }

  function checkGems() {
    for (const gem of gems) {
      if (gem.collected) continue;
      const gx1 = gem.x + TILE * 0.25, gx2 = gem.x + TILE * 0.75;
      const gy1 = gem.y + TILE * 0.25, gy2 = gem.y + TILE * 0.75;
      const px1 = player.x, px2 = player.x + player.w;
      const py1 = player.y, py2 = player.y + player.h;
      if (px1 < gx2 && px2 > gx1 && py1 < gy2 && py2 > gy1) {
        gem.collected = true;
        gemsCollected++;
        gemCountEl.textContent = gemsCollected;
      }
    }
    if (gemsCollected >= gemsTotal && gameState === 'playing') {
      gameState = 'clear';
      stageClearTimer = 0;
      clearOverlay.style.display = 'flex';
    }
  }

  // ---- 更新処理 ----
  function update() {
    if (appState !== 'playing') return;
    if (gameState === 'clear') {
      stageClearTimer++;
      if (stageClearTimer > 100) {
        startStage(stage + 1);
      }
      return;
    }

    if (input.left && !input.right) {
      player.vx = -MOVE_SPEED;
      player.facing = -1;
    } else if (input.right && !input.left) {
      player.vx = MOVE_SPEED;
      player.facing = 1;
    } else {
      player.vx = 0;
    }

    player.vy += GRAVITY;
    if (input.thrust) {
      player.vy -= THRUST_ACCEL;
      if (player.vy < -MAX_UP_SPEED) player.vy = -MAX_UP_SPEED;
    }
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;

    moveX(player.vx);
    moveY(player.vy);

    if (player.x < TILE) player.x = TILE;
    if (player.x + player.w > WORLD_W - TILE) player.x = WORLD_W - TILE - player.w;
    if (player.y < TILE) { player.y = TILE; player.vy = 0; }
    if (player.y + player.h > WORLD_H - TILE) { player.y = WORLD_H - TILE - player.h; player.vy = 0; player.onGround = true; }

    checkGems();
    updateEnemies();
    checkEnemyCollision();
    updateCamera();

    // 移動状態に応じた傾き(擬似3D)
    let targetTilt = 0;
    if (input.left || input.right) targetTilt += 0.16; // 進行方向へ前のめりに傾く
    if (input.thrust) targetTilt -= 0.24;               // 上昇時は後ろへ傾く(背中のバーニアが見える)
    player.visualTilt += (targetTilt - player.visualTilt) * 0.18;
  }

  // ---- 描画 ----
  function drawBrick(x, y) {
    ctx.fillStyle = '#8a4a3a';
    ctx.fillRect(x, y, TILE, TILE);
    ctx.strokeStyle = '#5c2f24';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x + 2, y + 2, TILE - 4, 4);
  }

  function drawGem(gem, t, cameraY) {
    if (gem.collected) return;
    const cx = gem.x + TILE / 2;
    const cy = gem.y + TILE / 2 - cameraY;
    const size = 11;
    const topW = size;
    const topY = -size * 0.6;
    const shine = 0.5 + 0.5 * Math.sin(t / 220 + (gem.x + gem.y));

    ctx.save();
    ctx.translate(cx, cy);

    // 外側の発光(視認性を上げるためのグロー)
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 2.2);
    glow.addColorStop(0, `rgba(150,225,255,${0.45 + 0.25 * shine})`);
    glow.addColorStop(1, 'rgba(150,225,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, size * 2.2, 0, Math.PI * 2);
    ctx.fill();

    // ダイヤ本体(横から見た逆三角形のカット)
    ctx.beginPath();
    ctx.moveTo(-topW, topY);
    ctx.lineTo(topW, topY);
    ctx.lineTo(0, size);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, topY, 0, size);
    grad.addColorStop(0, '#f2fdff');
    grad.addColorStop(0.5, '#7ad2ff');
    grad.addColorStop(1, '#1f7fc4');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.95)';
    ctx.lineWidth = 1.4;
    ctx.stroke();

    // ファセット(カット面)の線
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-topW * 0.45, topY);
    ctx.lineTo(0, size * 0.15);
    ctx.moveTo(topW * 0.45, topY);
    ctx.lineTo(0, size * 0.15);
    ctx.moveTo(0, size * 0.15);
    ctx.lineTo(0, size);
    ctx.stroke();

    // キラキラ(スパークル)
    ctx.globalAlpha = shine;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    const sx = size + 8, sy = topY;
    ctx.beginPath();
    ctx.moveTo(sx - 5, sy);
    ctx.lineTo(sx + 5, sy);
    ctx.moveTo(sx, sy - 5);
    ctx.lineTo(sx, sy + 5);
    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  function roundRectPath(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function drawRobot() {
    const w = player.w, h = player.h;
    const px = player.x;
    const py = player.y - cameraY;

    ctx.save();
    ctx.translate(px + w / 2, py + h / 2);
    ctx.scale(player.facing, 1);
    ctx.rotate(player.visualTilt);
    ctx.translate(-w / 2, -h / 2);

    // 背中のバーニアから吹く炎(上昇中のみ・体より奥に描画)
    if (input.thrust) {
      ctx.save();
      ctx.translate(w * 0.18, h * 0.72);
      const flameLen = h * (0.35 + Math.random() * 0.18);
      const fg = ctx.createLinearGradient(0, 0, 0, flameLen);
      fg.addColorStop(0, 'rgba(255,235,150,0.95)');
      fg.addColorStop(0.5, 'rgba(255,150,50,0.85)');
      fg.addColorStop(1, 'rgba(255,80,20,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.moveTo(-w * 0.11, 0);
      ctx.lineTo(w * 0.11, 0);
      ctx.lineTo(0, flameLen);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // 脚(キャタピラ)
    ctx.fillStyle = '#33343a';
    ctx.beginPath();
    ctx.ellipse(w * 0.32, h * 0.94, w * 0.24, h * 0.075, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(w * 0.70, h * 0.94, w * 0.24, h * 0.075, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4a4a52';
    ctx.beginPath();
    ctx.ellipse(w * 0.30, h * 0.92, w * 0.06, h * 0.03, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(w * 0.68, h * 0.92, w * 0.06, h * 0.03, 0, 0, Math.PI * 2);
    ctx.fill();

    // 脚の支柱
    ctx.fillStyle = '#8a1c2c';
    ctx.fillRect(w * 0.22, h * 0.68, w * 0.16, h * 0.26);
    ctx.fillRect(w * 0.62, h * 0.68, w * 0.16, h * 0.26);
    ctx.strokeStyle = '#5c0f1e';
    ctx.lineWidth = 1;
    ctx.strokeRect(w * 0.22, h * 0.68, w * 0.16, h * 0.26);
    ctx.strokeRect(w * 0.62, h * 0.68, w * 0.16, h * 0.26);

    // 腕
    ctx.strokeStyle = '#8a1c2c';
    ctx.lineWidth = w * 0.14;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w * 0.10, h * 0.42);
    ctx.lineTo(-w * 0.10, h * 0.60);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w * 0.90, h * 0.42);
    ctx.lineTo(w * 1.10, h * 0.60);
    ctx.stroke();
    ctx.fillStyle = '#5c5c64';
    ctx.beginPath();
    ctx.arc(-w * 0.10, h * 0.60, w * 0.09, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(w * 1.10, h * 0.60, w * 0.09, 0, Math.PI * 2);
    ctx.fill();

    // 頭(体)本体 - 赤いカプセル型
    const bodyGrad = ctx.createLinearGradient(0, 0, w, 0);
    bodyGrad.addColorStop(0, '#e2394f');
    bodyGrad.addColorStop(0.5, '#c81f3a');
    bodyGrad.addColorStop(1, '#8f1428');
    ctx.fillStyle = bodyGrad;
    roundRectPath(w * 0.14, h * 0.02, w * 0.72, h * 0.68, w * 0.20);
    ctx.fill();
    ctx.strokeStyle = '#5c0f1e';
    ctx.lineWidth = 1;
    ctx.stroke();

    // アンテナ(耳)
    ctx.fillStyle = '#c81f3a';
    ctx.beginPath();
    ctx.moveTo(w * 0.26, h * 0.08);
    ctx.lineTo(w * 0.21, -h * 0.10);
    ctx.lineTo(w * 0.34, h * 0.04);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(w * 0.74, h * 0.08);
    ctx.lineTo(w * 0.79, -h * 0.10);
    ctx.lineTo(w * 0.66, h * 0.04);
    ctx.closePath();
    ctx.fill();

    // 顔(青いバイザー)
    ctx.fillStyle = '#bfe6f5';
    roundRectPath(w * 0.24, h * 0.12, w * 0.52, h * 0.40, w * 0.14);
    ctx.fill();
    ctx.strokeStyle = '#5c0f1e';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 目
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(w * 0.39, h * 0.30, w * 0.09, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(w * 0.61, h * 0.30, w * 0.09, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(w * 0.41, h * 0.30, w * 0.045, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(w * 0.63, h * 0.30, w * 0.045, 0, Math.PI * 2);
    ctx.fill();

    // 口(にっこり)
    ctx.strokeStyle = '#5c0f1e';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(w * 0.5, h * 0.44, w * 0.10, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.stroke();

    ctx.restore();
  }

  function drawEnemy(enemy) {
    const cx = enemy.x + enemy.w / 2;
    const cy = enemy.y + enemy.h / 2 - cameraY;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(enemy.rotation);

    const rw = enemy.w / 2;
    const rh = enemy.h / 2;

    // ラグビーボール本体
    const grad = ctx.createLinearGradient(0, -rh, 0, rh);
    grad.addColorStop(0, '#fff59a');
    grad.addColorStop(0.5, '#ffd400');
    grad.addColorStop(1, '#d69f00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, rw, rh, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#8a6200';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // 縫い目(中央のライン)
    ctx.strokeStyle = '#8a6200';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-rw + 2, 0);
    ctx.lineTo(rw - 2, 0);
    ctx.stroke();
    // 縫い目の刻み
    for (let i = -2; i <= 2; i++) {
      const sx = i * (rw / 3.2);
      ctx.beginPath();
      ctx.moveTo(sx, -2);
      ctx.lineTo(sx, 2);
      ctx.stroke();
    }

    ctx.restore();
  }

  function draw(t) {
    if (appState !== 'playing') return;
    ctx.clearRect(0, 0, WORLD_W, VIEW_H);
    ctx.fillStyle = '#1a2138';
    ctx.fillRect(0, 0, WORLD_W, VIEW_H);

    const r1 = Math.floor(cameraY / TILE) - 1;
    const r2 = Math.floor((cameraY + VIEW_H) / TILE) + 1;
    for (let r = Math.max(0, r1); r <= Math.min(ROWS - 1, r2); r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] === 1) {
          drawBrick(c * TILE, r * TILE - cameraY);
        }
      }
    }

    for (const gem of gems) {
      if (gem.collected) continue;
      const screenY = gem.y - cameraY;
      if (screenY > -TILE && screenY < VIEW_H + TILE) {
        drawGem(gem, t, cameraY);
      }
    }

    for (const enemy of enemies) {
      const screenY = enemy.y - cameraY;
      if (screenY > -TILE && screenY < VIEW_H + TILE) {
        drawEnemy(enemy);
      }
    }

    drawRobot();
  }

  // ---- メインループ ----
  function loop(t) {
    update();
    draw(t || 0);
    requestAnimationFrame(loop);
  }

  showScreen('title');
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
